name: LQAS Pipeline (Posit Workflow - Parquet Edition)

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'R/**'
      - 'config/**'
      - 'data/lookup/**'
      - '.github/workflows/**'
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      force_full:
        description: 'Force full reprocessing of all files'
        required: false
        default: 'false'
        type: boolean
      specific_forms:
        description: 'Specific form IDs to process (comma-separated, leave empty for all)'
        required: false
        default: ''
        type: string
      environment:
        description: 'Environment to run'
        required: false
        default: 'production'
        type: choice
        options:
          - 'production'
          - 'staging'
          - 'development'

env:
  ONA_API_TOKEN: ${{ secrets.ONA_API_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  R_LIBS_USER: ~/.R/library

jobs:
  # ============================================================
  # JOB 1: Setup R with Parquet and Arrow support
  # ============================================================
  setup-r:
    name: 🔧 Setup R Environment (Parquet + Arrow)
    runs-on: ubuntu-latest
    outputs:
      r-version: ${{ steps.r-version.outputs.version }}
      cache-hit: ${{ steps.cache-packages.outputs.cache-hit }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup R
        id: r-version
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'
          use-public-rspm: true
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libgit2-dev \
            cmake \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libarrow-dev \
            libarrow-dataset-dev \
            libarrow-parquet-dev
      
      - name: Cache R packages
        id: cache-packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('renv.lock', 'DESCRIPTION') }}
          restore-keys: |
            ${{ runner.os }}-r-
      
      - name: Install optimized R packages
        if: steps.cache-packages.outputs.cache-hit != 'true'
        run: |
          install.packages(c(
            'arrow',        # Parquet support
            'data.table',   # Fast data manipulation
            'qs',           # Fast serialization
            'tidyverse',    # Core packages
            'lubridate',    # Dates
            'readxl',       # Read Excel
            'writexl',      # Write Excel
            'logger',       # Logging
            'fs',           # File system
            'stringr',      # String manipulation
            'stringi',      # Advanced string ops
            'janitor',      # Data cleaning
            'argparse',     # Command line arguments
            'future',       # Parallel processing
            'furrr',        # Future map functions
            'parallel',     # Parallel processing
            'doParallel',   # Parallel backend
            'foreach',      # Parallel foreach
            'rmarkdown',    # For dashboard
            'DT',           # Interactive tables
            'plotly'        # Interactive plots
          ), repos = 'https://cloud.r-project.org/', Ncpus = parallel::detectCores())
        shell: Rscript {0}
      
      - name: Verify installations
        run: |
          Rscript -e "
            library(arrow)
            library(data.table)
            library(qs)
            cat('✅ arrow version:', as.character(packageVersion('arrow')), '\n')
            cat('✅ data.table version:', as.character(packageVersion('data.table')), '\n')
            cat('✅ qs version:', as.character(packageVersion('qs')), '\n')
            cat('✅ Parquet support:', arrow::arrow_parquet_supported(), '\n')
            cat('✅ Available cores:', parallel::detectCores(), '\n')
          "
      
      - name: Save R packages cache
        uses: actions/cache/save@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ github.sha }}

  # ============================================================
  # JOB 2: Fetch Data from ONA (Save as Parquet)
  # ============================================================
  fetch-data:
    name: 📡 Fetch Data from ONA (Parquet)
    runs-on: ubuntu-latest
    needs: setup-r
    outputs:
      files_fetched: ${{ steps.count_files.outputs.count }}
      fetch_status: ${{ steps.fetch.outcome }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pandas requests pyyaml python-dotenv pyarrow
      
      - name: Create directories
        run: |
          mkdir -p data/raw data/processed data/final data/lookup logs reports/dashboards
      
      - name: Fetch data from ONA (Save as Parquet)
        id: fetch
        run: |
          python fetch_ona_data.py \
            --config config/config.yml \
            ${{ github.event.inputs.force_full == 'true' && '--force-full' || '' }} \
            ${{ github.event.inputs.specific_forms != '' && format('--form-ids {0}', github.event.inputs.specific_forms) || '' }}
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
      
      - name: Count fetched files
        id: count_files
        run: |
          count=$(ls -1 data/raw/*.parquet 2>/dev/null | wc -l)
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "📊 Total Parquet files fetched: $count"
      
      - name: Upload fetched data
        uses: actions/upload-artifact@v4
        with:
          name: raw-parquet-data
          path: data/raw/
          retention-days: 7
          if-no-files-found: warn
      
      - name: Upload fetch logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fetch-logs
          path: logs/
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================
  # JOB 3: Special Case - Form 272 (Parquet)
  # ============================================================
  special-272:
    name: 🟢 Special Case - Form 272
    runs-on: ubuntu-latest
    needs: [setup-r, fetch-data]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download raw Parquet data
        uses: actions/download-artifact@v4
        with:
          name: raw-parquet-data
          path: data/raw/
      
      - name: Check if 272.parquet exists
        id: check_272
        run: |
          if [ -f "data/raw/272.parquet" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ 272.parquet file found"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Restore R packages cache
        if: steps.check_272.outputs.exists == 'true'
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ github.sha }}
          fail-on-cache-miss: false
      
      - name: Setup R
        if: steps.check_272.outputs.exists == 'true'
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'
          use-public-rspm: true
      
      - name: Process 272.parquet
        if: steps.check_272.outputs.exists == 'true'
        run: |
          Rscript R/special_272.R \
            --input-file data/raw/272.parquet \
            --lookup-file data/lookup/lqas_lookup.xlsx \
            --output-file data/processed/272.csv
      
      - name: Upload processed 272 data
        if: steps.check_272.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: processed-data-special-272
          path: data/processed/272.csv
          retention-days: 7

  # ============================================================
  # JOB 4: Special Case - Nigeria CSV
  # ============================================================
  special-nigeria:
    name: 🟢 Special Case - Nigeria CSV
    runs-on: ubuntu-latest
    needs: [setup-r, fetch-data]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download raw Parquet data
        uses: actions/download-artifact@v4
        with:
          name: raw-parquet-data
          path: data/raw/
      
      - name: Check if Nigeria file exists
        id: check_nigeria
        run: |
          if [ -f "data/raw/Nigeria_LQAS_int_oct_2025.csv" ] || [ -f "data/raw/nigeria.parquet" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Nigeria file found"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Restore R packages cache
        if: steps.check_nigeria.outputs.exists == 'true'
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ github.sha }}
          fail-on-cache-miss: false
      
      - name: Setup R
        if: steps.check_nigeria.outputs.exists == 'true'
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'
          use-public-rspm: true
      
      - name: Process Nigeria data
        if: steps.check_nigeria.outputs.exists == 'true'
        run: |
          Rscript R/special_nigeria_csv.R \
            --input-file data/raw/Nigeria_LQAS_int_oct_2025.csv \
            --lookup-file data/lookup/lqas_lookup.xlsx \
            --output-file data/processed/nigeria_processed.csv
      
      - name: Upload processed Nigeria data
        if: steps.check_nigeria.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: processed-data-special-nigeria
          path: data/processed/nigeria_processed.csv
          retention-days: 7

  # ============================================================
  # JOB 5: Process Data with R (Complete Processing)
  # ============================================================
  process-data:
    name: ⚡ Process Data with R (Complete)
    runs-on: ubuntu-latest
    needs: [setup-r, fetch-data, special-272, special-nigeria]
    strategy:
      fail-fast: false
      matrix:
        chunk: [1, 2, 3, 4]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download raw Parquet data
        uses: actions/download-artifact@v4
        with:
          name: raw-parquet-data
          path: data/raw/
      
      - name: Download special case data
        uses: actions/download-artifact@v4
        with:
          pattern: processed-data-special-*
          path: data/processed/
          merge-multiple: true
        continue-on-error: true
      
      - name: Restore R packages cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ github.sha }}
          fail-on-cache-miss: false
      
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'
          use-public-rspm: true
      
      - name: Create output directory
        run: mkdir -p data/processed
      
      - name: Process files (Chunk ${{ matrix.chunk }}/4)
        run: |
          Rscript R/02_process_lqas.R \
            --input-dir data/raw \
            --output-dir data/processed \
            --chunk ${{ matrix.chunk }} \
            --total-chunks 4 \
            ${{ github.event.inputs.force_full == 'true' && '--force-full' || '' }}
      
      - name: Upload processed data chunk
        uses: actions/upload-artifact@v4
        with:
          name: processed-data-chunk-${{ matrix.chunk }}
          path: data/processed/
          retention-days: 7
      
      - name: Upload processing logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: processing-logs-chunk-${{ matrix.chunk }}
          path: logs/
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================
  # JOB 6: Combine and Validate
  # ============================================================
  combine-validate:
    name: 🔗 Combine and Validate Data
    runs-on: ubuntu-latest
    needs: process-data
    outputs:
      total_records: ${{ steps.combine.outputs.records }}
      total_countries: ${{ steps.combine.outputs.countries }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download all processed data chunks
        uses: actions/download-artifact@v4
        with:
          pattern: processed-data-chunk-*
          path: data/processed/
          merge-multiple: true
      
      - name: Download special case data
        uses: actions/download-artifact@v4
        with:
          pattern: processed-data-special-*
          path: data/processed/
          merge-multiple: true
        continue-on-error: true
      
      - name: Restore R packages cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ github.sha }}
          fail-on-cache-miss: false
      
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'
          use-public-rspm: true
      
      - name: Combine and validate
        id: combine
        run: |
          Rscript -e "
            library(data.table)
            library(arrow)
            library(logger)
            
            log_appender(appender_file('logs/combine.log'))
            log_info('Combining processed data...')
            
            # Read all CSV files from processed directory
            csv_files <- list.files('data/processed', pattern = '\\.csv$', full.names = TRUE)
            log_info('Found {length(csv_files)} CSV files')
            
            # Combine efficiently with rbindlist
            combined <- rbindlist(lapply(csv_files, fread), fill = TRUE, use.names = TRUE)
            log_info('Combined: {nrow(combined)} rows, {ncol(combined)} columns')
            
            # Save as Parquet (optimized for columnar storage)
            write_parquet(combined, 'data/final/combined_lqas.parquet')
            log_info('✅ Saved as Parquet: data/final/combined_lqas.parquet')
            
            # Also save as CSV for compatibility
            fwrite(combined, 'data/combined_lqas_data.csv')
            log_info('✅ Saved as CSV: data/combined_lqas_data.csv')
            
            # Quality checks
            log_info('Running quality checks...')
            
            # Check completeness
            completeness <- combined[, .(
              total_rows = .N,
              pct_complete = round(sum(!is.na(total_vaccinated)) / .N * 100, 1)
            )]
            log_info('Data completeness: {completeness$pct_complete}%')
            
            # Check coverage
            combined[, coverage := total_vaccinated / total_sampled * 100]
            coverage_stats <- combined[, .(
              mean_coverage = round(mean(coverage, na.rm = TRUE), 1),
              median_coverage = round(median(coverage, na.rm = TRUE), 1),
              min_coverage = round(min(coverage, na.rm = TRUE), 1),
              max_coverage = round(max(coverage, na.rm = TRUE), 1)
            )]
            log_info('Coverage - Mean: {coverage_stats$mean_coverage}%, Median: {coverage_stats$median_coverage}%')
            
            # Detect anomalies
            anomalies <- combined[total_vaccinated > total_sampled | total_sampled == 0]
            if (nrow(anomalies) > 0) {
              log_warn('Found {nrow(anomalies)} anomalies')
              write_parquet(anomalies, 'reports/anomalies.parquet')
            }
            
            # Output stats for GitHub
            cat(paste('records=', nrow(combined)), file = Sys.getenv('GITHUB_OUTPUT'), append = TRUE)
            cat(paste('countries=', nrow(unique(combined$country))), file = Sys.getenv('GITHUB_OUTPUT'), append = TRUE)
            
            log_info('✅ Quality control complete')
          "
        shell: bash
      
      - name: Upload combined data
        uses: actions/upload-artifact@v4
        with:
          name: combined-data
          path: data/final/combined_lqas.parquet
          retention-days: 30
      
      - name: Upload QC report
        uses: actions/upload-artifact@v4
        with:
          name: qc-report
          path: reports/
          retention-days: 30

  # ============================================================
  # JOB 7: Geoname Cleaning (Full district/province mappings)
  # ============================================================
  clean-geoname:
    name: 🧹 Clean Geoname Data (Full Mappings)
    runs-on: ubuntu-latest
    needs: combine-validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download combined data
        uses: actions/download-artifact@v4
        with:
          name: combined-data
          path: data/final/
      
      - name: Restore R packages cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ github.sha }}
          fail-on-cache-miss: false
      
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'
          use-public-rspm: true
      
      - name: Run geoname cleaning (with full mappings)
        run: |
          Rscript R/03_clean_geonames.R \
            --input-file data/final/combined_lqas.parquet \
            --lookup-file data/lookup/lqas_lookup.xlsx \
            --output-file data/final/lqas_final.parquet \
            --start-date "2019-10-01"
      
      - name: Upload cleaned data
        uses: actions/upload-artifact@v4
        with:
          name: cleaned-data
          path: data/final/lqas_final.parquet
          retention-days: 30
      
      - name: Upload CSV version for compatibility
        run: |
          Rscript -e "
            library(arrow)
            library(data.table)
            dt <- read_parquet('data/final/lqas_final.parquet')
            fwrite(dt, 'data/final/lqas_final.csv')
          "
      
      - name: Upload CSV version
        uses: actions/upload-artifact@v4
        with:
          name: cleaned-data-csv
          path: data/final/lqas_final.csv
          retention-days: 30

  # ============================================================
  # JOB 8: Generate Dashboard (R Markdown)
  # ============================================================
  dashboard:
    name: 📊 Generate Dashboard
    runs-on: ubuntu-latest
    needs: clean-geoname
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download final data
        uses: actions/download-artifact@v4
        with:
          name: cleaned-data
          path: data/final/
      
      - name: Restore R packages cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ github.sha }}
          fail-on-cache-miss: false
      
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'
          use-public-rspm: true
      
      - name: Render Dashboard
        run: |
          Rscript -e "
            library(rmarkdown)
            library(arrow)
            library(data.table)
            
            # Create reports directory if it doesn't exist
            dir.create('reports/dashboards', recursive = TRUE, showWarnings = FALSE)
            
            # Render the R Markdown dashboard
            render('R/04_dashboard.Rmd', 
                   output_file = '../reports/dashboards/dashboard.html',
                   params = list(
                     data_file = 'data/final/lqas_final.parquet',
                     run_id = Sys.getenv('GITHUB_RUN_ID', 'local'),
                     run_date = Sys.Date()
                   ))
            
            cat('✅ Dashboard rendered to reports/dashboards/dashboard.html\n')
          "
      
      - name: Upload dashboard
        uses: actions/upload-artifact@v4
        with:
          name: dashboard
          path: reports/dashboards/dashboard.html
          retention-days: 30
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports/dashboards
          publish_branch: gh-pages
          destination_dir: latest
          keep_files: false

  # ============================================================
  # JOB 9: Run Quality Control Checks
  # ============================================================
  quality-control:
    name: 🔍 Run Quality Control Checks
    runs-on: ubuntu-latest
    needs: clean-geoname
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download final data
        uses: actions/download-artifact@v4
        with:
          name: cleaned-data
          path: data/final/
      
      - name: Restore R packages cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ github.sha }}
          fail-on-cache-miss: false
      
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'
          use-public-rspm: true
      
      - name: Run QC checks
        run: |
          Rscript R/05_quality_control.R \
            --input-file data/final/lqas_final.parquet \
            --output-dir reports \
            --threshold 90
      
      - name: Upload QC report
        uses: actions/upload-artifact@v4
        with:
          name: qc-report-detailed
          path: reports/qc_report.html
          retention-days: 30
      
      - name: Upload QC summary
        uses: actions/upload-artifact@v4
        with:
          name: qc-summary
          path: reports/qc_summary.json
          retention-days: 30

  # ============================================================
  # JOB 10: Send Notifications
  # ============================================================
  notify:
    name: 📧 Send Notifications
    needs: [fetch-data, special-272, special-nigeria, process-data, combine-validate, clean-geoname, dashboard, quality-control]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check status
        id: status
        run: |
          if [[ "${{ needs.fetch-data.result }}" == "success" && \
                "${{ needs.process-data.result }}" == "success" && \
                "${{ needs.combine-validate.result }}" == "success" && \
                "${{ needs.clean-geoname.result }}" == "success" && \
                "${{ needs.dashboard.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi
      
      - name: Create summary
        id: summary
        run: |
          echo "### LQAS Pipeline Summary (Parquet Edition)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Setup R | ${{ needs.setup-r.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Fetch Data (Parquet) | ${{ needs.fetch-data.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Special 272 | ${{ needs.special-272.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Special Nigeria | ${{ needs.special-nigeria.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Process Data | ${{ needs.process-data.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Combine & Validate | ${{ needs.combine-validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Geoname Cleaning | ${{ needs.clean-geoname.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard | ${{ needs.dashboard.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Control | ${{ needs.quality-control.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall Status:** ${{ steps.status.outputs.status }}" >> $GITHUB_STEP_SUMMARY
      
      - name: Send email notification
        if: env.EMAIL_USER != '' && env.EMAIL_PASSWORD != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "LQAS Pipeline (Parquet) ${{ steps.status.outputs.status }} - Run #${{ github.run_number }}"
          to: ${{ secrets.NOTIFICATION_EMAILS }}
          from: LQAS Automation <${{ secrets.EMAIL_USER }}>
          body: |
            LQAS Pipeline Execution Report (Parquet Edition - Full Geoname Clean)
            =====================================================================
            
            Status: ${{ steps.status.outputs.status }}
            Run ID: #${{ github.run_number }}
            Trigger: ${{ github.event_name }}
            Environment: ${{ github.event.inputs.environment || 'production' }}
            
            📊 Processing Summary:
            - Data Fetch (Parquet): ${{ needs.fetch-data.result }}
            - Special Case 272: ${{ needs.special-272.result }}
            - Special Case Nigeria: ${{ needs.special-nigeria.result }}
            - R Processing: ${{ needs.process-data.result }}
            - Validation: ${{ needs.combine-validate.result }}
            - Geoname Cleaning: ${{ needs.clean-geoname.result }}
            - Dashboard: ${{ needs.dashboard.result }}
            - Quality Control: ${{ needs.quality-control.result }}
            
            📈 Dashboard:
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/latest/dashboard.html
            
            ${{ steps.status.outputs.status == 'failed' && '🔧 Action Required:\nCheck logs: ' || '' }}${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            ---
            *Parquet-optimized pipeline | Full geoname cleaning | District/Province mappings applied*
      
      - name: Create GitHub Issue on Failure
        if: steps.status.outputs.status == 'failed'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ LQAS Parquet Pipeline Failed - Run #${context.runId}`,
              body: `## Pipeline Failure Report (Parquet Edition - Full Geoname Clean)
              
              **Run ID:** ${context.runId}
              **Trigger:** ${context.eventName}
              **Time:** ${new Date().toISOString()}
              
              ### Failed Jobs:
              - Setup R: ${{ needs.setup-r.result }}
              - Fetch Data: ${{ needs.fetch-data.result }}
              - Special 272: ${{ needs.special-272.result }}
              - Special Nigeria: ${{ needs.special-nigeria.result }}
              - Processing: ${{ needs.process-data.result }}
              - Validation: ${{ needs.combine-validate.result }}
              - Geoname Cleaning: ${{ needs.clean-geoname.result }}
              - Dashboard: ${{ needs.dashboard.result }}
              - Quality Control: ${{ needs.quality-control.result }}
              
              ### Action URL:
              ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
              
              ### Project Structure:
              - Python fetcher: \`fetch_ona_data.py\`
              - R processing: \`R/02_process_lqas.R\`
              - Geoname cleaning: \`R/03_clean_geonames.R\`
              - Dashboard: \`R/04_dashboard.Rmd\`
              - QC checks: \`R/05_quality_control.R\`
              - Lookup: \`data/lookup/lqas_lookup.xlsx\`
              
              Please investigate and fix the issues.`,
              labels: ['pipeline-failure', 'parquet', 'geoname-clean', 'urgent']
            })