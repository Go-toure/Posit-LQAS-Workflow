name: LQAS Monday Pipeline

on:
  schedule:
    # Run every Monday at 11:00 AM UTC
    - cron: '0 11 * * 1'
  workflow_dispatch:
    inputs:
      force_full:
        description: 'Force full data refresh'
        required: false
        default: false
        type: boolean

env:
  ONA_API_TOKEN: ${{ secrets.ONA_API_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  run-monday-pipeline:
    name: Monday LQAS Pipeline
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Setup R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.3.0'
        use-public-rspm: true
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install requests pandas pyarrow pyyaml
    
    - name: Install R dependencies
      run: |
        install.packages(c(
          'data.table', 'ggplot2', 'jsonlite', 'logger',
          'arrow', 'DT', 'flexdashboard', 'rmarkdown',
          'lubridate', 'dplyr', 'tidyr', 'janitor'
        ), repos = 'https://cloud.r-project.org/')
      shell: Rscript {0}
    
    - name: Create directories
      run: |
        mkdir -p data/raw data/processed data/final data/lookup logs reports
    
    - name: Fetch data from ONA
      run: |
        python fetch_ona_data.py --force-full
      if: github.event.inputs.force_full == 'true'
    
    - name: Fetch data from ONA (incremental)
      run: |
        python fetch_ona_data.py
      if: github.event.inputs.force_full != 'true'
    
    - name: Process LQAS data
      run: |
        Rscript R/02_process_lqas.R
    
    - name: Clean geonames
      run: |
        Rscript R/03_clean_geonames.R
    
    - name: Generate dashboard
      run: |
        Rscript executive_dashboard.R
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/final/lqas_cleaned.csv
        git add data/final/lqas_cleaned.parquet
        git add 04_dashboard.html
        git diff --quiet && git diff --staged --quiet || git commit -m "Monday update: $(date +'%Y-%m-%d %H:%M')"
        git push origin main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload dashboard artifact
      uses: actions/upload-artifact@v4
      with:
        name: lqas-dashboard-${{ github.run_number }}
        path: 04_dashboard.html
        retention-days: 30
    
    - name: Upload data artifact
      uses: actions/upload-artifact@v4
      with:
        name: lqas-data-${{ github.run_number }}
        path: data/final/
        retention-days: 7
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        publish_branch: gh-pages
        keep_files: false
        destination_dir: latest
        enable_jekyll: false
    
    - name: Create summary
      run: |
        echo "## Monday LQAS Pipeline Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
        echo "**Date:** $(date)" >> $GITHUB_STEP_SUMMARY
        echo "**Status:** ✅ SUCCESS" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Dashboard" >> $GITHUB_STEP_SUMMARY
        echo "- [View Dashboard](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/latest/04_dashboard.html)" >> $GITHUB_STEP_SUMMARY
